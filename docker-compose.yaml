services:
  # ================= Databases =================
  users-db:
    image: postgres:15
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    ports:
      - "5435:5432"
    volumes:
      - users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - teachsync_net

  course-db:
    image: postgres:15
    environment:
      POSTGRES_DB: courses
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5437:5432"
    volumes:
      - course_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d courses"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - teachsync_net

  schedule-db:
    image: postgres:15
    environment:
      POSTGRES_DB: schedules
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - schedule_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d schedules"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - teachsync_net

  replacement-db:
    image: postgres:15
    environment:
      POSTGRES_DB: replacements
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - replacement_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d replacements"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - teachsync_net

  notification-db:
    image: postgres:15
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notifications"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - teachsync_net

  # ================= Kafka =================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/2181; echo srvr >&3; cat <&3 | grep Mode'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - teachsync_net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - teachsync_net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: teachsync
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - teachsync_net

  # ================= Backend services =================
  users-service:
    build:
      context: .
      dockerfile: users-service/Dockerfile
    depends_on:
      users-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://users-db:5432/users
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TEACHSYNC_SERVICES_COURSES_URL: http://course-service:8081/internal/courses
    ports:
      - "8083:8083"
    restart: on-failure
    networks:
      - teachsync_net

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    depends_on:
      - users-service
    environment:
      TEACHSYNC_SERVICES_USERS_URL: http://users-service:8083/internal/users
    ports:
      - "8090:8090"
    restart: on-failure
    networks:
      - teachsync_net

  course-service:
    build:
      context: .
      dockerfile: course-service/Dockerfile
    depends_on:
      course-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      users-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://course-db:5432/courses
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TEACHSYNC_SERVICES_USERS_URL: http://users-service:8083/internal/users
      TEACHSYNC_SERVICES_SCHEDULES_URL: http://schedule-service:8082/internal/schedules
    ports:
      - "8081:8081"
    restart: on-failure
    networks:
      - teachsync_net

  schedule-service:
    build:
      context: .
      dockerfile: schedule-service/Dockerfile
    depends_on:
      schedule-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      users-service:
        condition: service_started
      course-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://schedule-db:5432/schedules
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TEACHSYNC_SERVICES_USERS_URL: http://users-service:8083/internal/users
      TEACHSYNC_SERVICES_COURSES_URL: http://course-service:8081/internal/courses
    ports:
      - "8082:8082"
    restart: on-failure
    networks:
      - teachsync_net

  replacement-service:
    build:
      context: .
      dockerfile: replacement-service/Dockerfile
    depends_on:
      replacement-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      users-service:
        condition: service_started
      course-service:
        condition: service_started
      schedule-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://replacement-db:5432/replacements
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TEACHSYNC_SERVICES_USERS_URL: http://users-service:8083/internal/users
      TEACHSYNC_SERVICES_COURSES_URL: http://course-service:8081/internal/courses
      TEACHSYNC_SERVICES_SCHEDULES_URL: http://schedule-service:8082/internal/schedules
    ports:
      - "8086:8086"
    restart: on-failure
    networks:
      - teachsync_net

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    depends_on:
      notification-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-db:5432/notifications
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8085:8085"
    restart: on-failure
    networks:
      - teachsync_net

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    depends_on:
      - auth-service
      - users-service
      - course-service
      - schedule-service
      - replacement-service
      - notification-service
    environment:
      USERS_SERVICE_URL: http://users-service:8083
      AUTH_SERVICE_URL: http://auth-service:8090
      COURSE_SERVICE_URL: http://course-service:8081
      SCHEDULE_SERVICE_URL: http://schedule-service:8082
      REPLACEMENT_SERVICE_URL: http://replacement-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
    ports:
      - "8080:8080"
    restart: on-failure
    networks:
      - teachsync_net

  # ================= Frontend =================
  teachsync-ui:
    build:
      context: .
      dockerfile: front/teachsync-ui/Dockerfile
    depends_on:
      - gateway-service
    ports:
      - "4200:80"
    restart: on-failure
    networks:
      - teachsync_net

volumes:
  users_data:
  course_data:
  schedule_data:
  replacement_data:
  notification_data:

networks:
  teachsync_net:
    driver: bridge
