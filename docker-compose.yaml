services:
  # ================= Databases =================
  users-db:
    image: postgres:15
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    ports:
      - "5435:5432"
    volumes:
      - users_data:/var/lib/postgresql/data
    networks:
      - teachsync_net

  course-db:
    image: postgres:15
    environment:
      POSTGRES_DB: courses
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5437:5432"
    volumes:
      - course_data:/var/lib/postgresql/data
    networks:
      - teachsync_net

  schedule-db:
    image: postgres:15
    environment:
      POSTGRES_DB: schedules
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - schedule_data:/var/lib/postgresql/data
    networks:
      - teachsync_net

  replacement-db:
    image: postgres:15
    environment:
      POSTGRES_DB: replacements
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - replacement_data:/var/lib/postgresql/data
    networks:
      - teachsync_net

  # ================= Kafka =================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - teachsync_net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - teachsync_net

  # Kafka UI — удобный дашборд для отладки
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: teachsync
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - teachsync_net

  # ================= Notification DB =================
  notification-db:
    image: postgres:15
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - notification_data:/var/lib/postgresql/data
    networks:
      - teachsync_net

  # ================= Audit DB =================
  audit-db:
    image: postgres:15
    environment:
      POSTGRES_DB: audit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    volumes:
      - audit_data:/var/lib/postgresql/data
    networks:
      - teachsync_net

volumes:
  users_data:
  course_data:
  schedule_data:
  replacement_data:
  notification_data:
  audit_data:
  cache:

networks:
  teachsync_net:
    driver: bridge