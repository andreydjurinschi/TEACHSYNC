spring.application.name=api-gateway
server.port=8080

# USERS
spring.cloud.gateway.routes[0].id=users-service
spring.cloud.gateway.routes[0].uri=${USERS_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[0].predicates[0]=Path=/teachsync/users/**

# AUTH
spring.cloud.gateway.routes[1].id=auth-service
spring.cloud.gateway.routes[1].uri=${AUTH_SERVICE_URL:http://localhost:8090}
spring.cloud.gateway.routes[1].predicates[0]=Path=/teachsync/auth/**

# ACCOUNT
spring.cloud.gateway.routes[2].id=account-service
spring.cloud.gateway.routes[2].uri=${AUTH_SERVICE_URL:http://localhost:8090}
