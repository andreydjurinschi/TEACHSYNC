<section class="app-page">
  <div class="app-page-content max-w-4xl">
    <div class="app-page-header">
      <div>
        <h1 class="app-page-title">Изменить пользователя</h1>
        <p class="app-page-subtitle">{{ user()?.name }} {{ user()?.surname }}</p>
      </div>
      <a routerLink="/users" class="app-btn-secondary px-3" aria-label="Назад">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
      </a>
    </div>

    <div class="app-panel">
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label class="app-label mb-2 block">Имя</label>
            <input formControlName="name" type="text" class="app-input" />
          </div>
          <div>
            <label class="app-label mb-2 block">Фамилия</label>
            <input formControlName="surname" type="text" class="app-input" />
          </div>
        </div>

        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label class="app-label mb-2 block">Email</label>
            <input formControlName="email" type="email" class="app-input" />
          </div>
          <div>
            <label class="app-label mb-2 block">Роль</label>
            <select formControlName="role" class="app-input">
              <option value="ADMIN">Admin</option>
              <option value="TEACHER">Teacher</option>
              <option value="MANAGER">Manager</option>
            </select>
          </div>
        </div>

        <div>
          <label class="app-label mb-2 block">Фото профиля</label>
          <div class="rounded-md border border-dashed border-slate-300 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-950">
            @if (previewUrl()) {
              <img [src]="previewUrl()!" alt="Фото пользователя" class="mb-3 h-32 w-32 rounded-md object-cover" />
            } @else {
              <div class="mb-3 flex h-32 w-32 items-center justify-center rounded-md border border-slate-200 bg-white text-sm text-slate-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-400">
                Нет фото
              </div>
            }
            <input type="file" accept="image/*" (change)="onFileSelected($event)" class="block w-full text-sm text-slate-600 file:mr-4 file:rounded-md file:border-0 file:bg-slate-200 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-slate-700 hover:file:bg-slate-300 dark:text-slate-300 dark:file:bg-slate-800 dark:file:text-slate-200 dark:hover:file:bg-slate-700" />
            @if (imageError()) {
              <p class="mt-2 text-xs text-red-600 dark:text-red-400">{{ imageError() }}</p>
            }
            @if (previewUrl()) {
              <button type="button" (click)="clearProfilePicture()" class="mt-3 text-sm font-semibold text-slate-600 transition hover:text-blue-900 dark:text-slate-300 dark:hover:text-blue-300">
                Удалить фото
              </button>
            }
          </div>
        </div>

        @if (isTeacher()) {
          <div>
            <label class="app-label mb-3 block">Специализации</label>
            <div class="grid grid-cols-1 gap-2 sm:grid-cols-2 md:grid-cols-3">
              @for (cat of categories(); track cat.id) {
                <button
                  type="button"
                  (click)="toggleSpec(cat.id)"
                  [class]="isSpecSelected(cat.id)
                    ? 'flex items-center gap-2 rounded-md border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm font-semibold text-emerald-800 transition dark:border-emerald-900/70 dark:bg-emerald-950/40 dark:text-emerald-300'
                    : 'flex items-center gap-2 rounded-md border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-semibold text-slate-600 transition hover:border-blue-200 hover:bg-blue-50 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-400 dark:hover:border-slate-600 dark:hover:bg-slate-800'">
                  @if (isSpecSelected(cat.id)) {
                    <svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                    </svg>
                  } @else {
                    <span class="h-4 w-4 shrink-0 rounded-sm border border-slate-300 dark:border-slate-600"></span>
                  }
                  {{ cat.name }}
                </button>
              }
            </div>
          </div>
        }

        <div class="flex flex-wrap gap-3 border-t border-slate-200 pt-4 dark:border-slate-800">
          <button type="submit" [disabled]="form.invalid || saving()" class="app-btn-primary flex-1 sm:flex-none">
            {{ saving() ? 'Сохранение...' : 'Сохранить изменения' }}
          </button>
          <a routerLink="/users" class="app-btn-secondary flex-1 sm:flex-none">Отменить</a>
        </div>
      </form>
    </div>
  </div>
</section>
