<div class="p-8 max-w-xl">
  <div class="flex items-center gap-3 mb-6">
    <a routerLink="/users" class="text-slate-400 hover:text-white transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h2 class="text-2xl font-bold text-white">Edit {{ user()?.name }} {{ user()?.surname }}</h2>
  </div>

  <div class="bg-slate-800 rounded-xl border border-slate-700 p-6">
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Name</label>
        <input formControlName="name" type="text"
          class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5
                 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition"/>
      </div>

            <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Surname</label>
        <input formControlName="surname" type="text"
          class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5
                 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition"/>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Email</label>
        <input formControlName="email" type="email"
          class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5
                 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition"/>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-400 mb-1">Role</label>
        <select formControlName="role"
          class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2.5
                 text-white focus:outline-none focus:border-indigo-500 transition">
          <option value="ADMIN">Admin</option>
          <option value="TEACHER">Teacher</option>
          <option value="MANAGER">Manager</option>
        </select>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" [disabled]="form.invalid"
          class="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50
                 text-white font-medium rounded-lg transition">
          Save Changes
        </button>
        <a routerLink="/users"
          class="flex-1 py-2.5 bg-slate-700 hover:bg-slate-600 text-slate-300
                 font-medium rounded-lg transition text-center">
          Cancel
        </a>
      </div>

    </form>
  </div>
</div>
