<div class="p-8">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-white">Users</h1>
    <a [routerLink]="['/users/create']"
       class="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700
              text-white text-sm font-medium rounded-lg transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Add User
    </a>
  </div>

  <div class="bg-slate-800 rounded-xl overflow-hidden border border-slate-700 shadow-lg">
    <table class="min-w-full">
      <thead>
        <tr class="bg-slate-900 text-slate-400 text-xs uppercase tracking-wider">
          <th class="px-6 py-4 text-left">ID</th>
          <th class="px-6 py-4 text-left">Name</th>
          <th class="px-6 py-4 text-left">Surname</th>
          <th class="px-6 py-4 text-left">Email</th>
          <th class="px-6 py-4 text-left">Role</th>
          <th class="px-6 py-4 text-left">Registered At</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-700">
        <tr *ngFor="let user of users()"
            class="hover:bg-slate-700/50 cursor-pointer transition-colors"
            [routerLink]="['/users', user.id]">
          <td class="px-6 py-4 text-slate-400 text-sm">{{ user.id }}</td>
          <td class="px-6 py-4 text-white font-medium">{{ user.name }}</td>
          <td class="px-6 py-4 text-white font-medium">{{ user.surname }}</td>
          <td class="px-6 py-4 text-slate-300 text-sm">{{ user.email }}</td>
          <td class="px-6 py-4">
            <span class="px-2 py-1 rounded-full text-xs font-semibold"
              [ngClass]="{
                'bg-indigo-500/20 text-indigo-300': user.role === 'ADMIN',
                'bg-emerald-500/20 text-emerald-300': user.role === 'TEACHER',
                'bg-amber-500/20 text-amber-300': user.role === 'MANAGER'
              }">
              {{ user.role }}
            </span>
          </td>
          <td class="px-6 py-4 text-slate-400 text-sm">{{ user.registeredAt }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
