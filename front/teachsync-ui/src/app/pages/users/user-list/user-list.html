<section class="app-page">
  <div class="app-page-content">
    <div class="app-page-header">
      <div>
        <h1 class="app-page-title">Пользователи</h1>
        <p class="app-page-subtitle">Управление учетными записями, ролями и доступом.</p>
      </div>
      <a [routerLink]="['/users/create']" class="app-btn-primary gap-2">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Добавить пользователя
      </a>
    </div>

    <div class="app-table-wrap">
      <table class="app-table">
        <thead>
          <tr>
            <th>Имя</th>
            <th>Фамилия</th>
            <th>Email</th>
            <th>Роль</th>
            <th>Зарегистрирован</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of visibleUsers()" class="cursor-pointer" [routerLink]="['/users', user.id]">
            <td>
              <div class="flex items-center gap-3">
                @if (user.profilePicture) {
                  <img [src]="user.profilePicture" [alt]="user.name" class="h-10 w-10 rounded-md object-cover" />
                } @else {
                  <div class="flex h-10 w-10 items-center justify-center rounded-md border border-slate-200 bg-slate-100 text-sm font-semibold text-slate-600 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300">
                    {{ user.name[0] }}{{ user.surname[0] }}
                  </div>
                }
                <span class="font-semibold text-slate-950 dark:text-white">{{ user.name }}</span>
              </div>
            </td>
            <td class="font-medium text-slate-800 dark:text-slate-100">{{ user.surname }}</td>
            <td class="text-slate-600 dark:text-slate-300">{{ user.email }}</td>
            <td>
              <span
                class="app-status"
                [ngClass]="{
                  'app-status-blue': user.role === 'ADMIN',
                  'app-status-green': user.role === 'TEACHER'
                }">
                {{ user.role }}
              </span>
            </td>
            <td class="text-slate-600 dark:text-slate-300">{{ user.registeredAt }}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <app-pagination-controls
      [currentPage]="currentPage()"
      [totalPages]="totalPages()"
      [totalItems]="users().length"
      itemLabel="users"
      (pageChange)="currentPage.set($event)" />
  </div>
</section>
