<div class="p-8 max-w-2xl">

  <div *ngIf="loading()" class="flex justify-center mt-12">
    <mat-progress-spinner mode="indeterminate" color="accent"></mat-progress-spinner>
  </div>

  <div *ngIf="userWithCourses()" class="bg-slate-800 rounded-xl border border-slate-700 shadow-lg overflow-hidden">
    <!-- Header -->
    <div class="px-6 py-5 border-b border-slate-700 flex items-center gap-4">
      <div class="w-12 h-12 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-lg">
        {{ userWithCourses()?.name?.charAt(0) }}
      </div>
      <div>
        <h2 class="text-xl font-bold text-white">{{ userWithCourses()?.name }} {{ userWithCourses()?.surname }}</h2>
        <span class="px-2 py-0.5 rounded-full text-xs font-semibold"
          [ngClass]="{
            'bg-indigo-500/20 text-indigo-300': user()?.role === 'ADMIN',
            'bg-emerald-500/20 text-emerald-300': user()?.role === 'TEACHER',
            'bg-amber-500/20 text-amber-300': user()?.role === 'MANAGER'
          }">
          {{ user()?.role }}
        </span>
      </div>
    </div>

    <!-- Info -->
    <div class="px-6 py-4 space-y-3">
      <div class="flex items-center gap-3 text-slate-300 text-sm">
        <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        {{ userWithCourses()?.email }}
      </div>
    </div>

    <!-- Courses -->
    <div *ngIf="user()?.role === 'TEACHER'" class="px-6 py-4 border-t border-slate-700">
      <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Courses</h3>
      <div *ngIf="userWithCourses()?.available; else noCourses" class="space-y-2">
        <div *ngFor="let course of userWithCourses()?.courseNames"
             class="px-4 py-2 bg-slate-700/50 rounded-lg text-slate-300 text-sm">
          {{ course.name }}
        </div>
      </div>
      <ng-template #noCourses>
        <p class="text-amber-400 text-sm">Курсы временно недоступны.</p>
      </ng-template>
    </div>

<!-- Actions -->
<div class="px-6 py-4 border-t border-slate-700 flex gap-3">
  <a [routerLink]="['/users/edit', userWithCourses()?.id]"
     class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm rounded-lg transition">
    Edit
  </a>
  <button (click)="confirmDelete()"
     class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm rounded-lg transition">
    Delete
  </button>
  <a routerLink="/users"
     class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm rounded-lg transition">
    Back
  </a>
</div>
</div>
