<div *ngIf="userWithCourses()">
  <h2>{{ userWithCourses()?.name }} {{ userWithCourses()?.surname }}</h2>
  <p>Email: {{ userWithCourses()?.email }}</p>

  <h3 *ngIf="userWithCourses()?.courseNames?.length">Courses:</h3>
  <ul>
    <li *ngFor="let course of userWithCourses()?.courseNames">
      {{ course.name }}
    </li>
  </ul>
</div>
