<div class="min-h-screen bg-slate-100 dark:bg-slate-900 p-8">

  <div class="flex items-center gap-3 mb-8">
    <a [routerLink]="['/groups', groupId]"
       class="text-slate-400 hover:text-slate-900 dark:hover:text-white transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-2xl font-bold text-slate-900 dark:text-white">
      Курсы — {{ groupData()?.name }}
    </h1>
  </div>

  <div class="max-w-lg mx-auto">
    <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200
                dark:border-slate-700 p-6">

      <h3 class="text-xs font-semibold text-slate-500 dark:text-slate-400
                 uppercase tracking-widest mb-4">
        Все курсы
      </h3>

      @if (!allCourses().length) {
        <p class="text-slate-400 text-sm">Курсы не найдены</p>
      } @else {
        <div class="space-y-2">
          @for (course of allCourses(); track course.id) {
            <div class="flex items-center justify-between px-4 py-3
                        bg-slate-50 dark:bg-slate-700/50 rounded-lg">

              <div class="flex items-center gap-3">
                <span class="w-1.5 h-1.5 rounded-full flex-shrink-0"
                      [class]="isAssigned(course.id)
                        ? 'bg-indigo-400'
                        : 'bg-slate-300 dark:bg-slate-600'">
                </span>
                <span class="text-sm text-slate-700 dark:text-slate-300">
                  {{ course.name }}
                </span>
              </div>

              <button (click)="isAssigned(course.id) ? unassign(course) : assign(course)"
                      [disabled]="loadingId() === course.id"
                      class="px-3 py-1.5 text-xs font-medium rounded-lg transition
                             disabled:opacity-50 disabled:cursor-not-allowed
                             flex items-center gap-1.5"
                      [class]="isAssigned(course.id)
                        ? 'bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-200'
                        : 'bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-200'">

                @if (loadingId() === course.id) {
                  <svg class="animate-spin w-3 h-3" fill="none" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke="currentColor"
                            stroke-opacity="0.3" stroke-width="3"/>
                    <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor"
                          stroke-width="3" stroke-linecap="round"/>
                  </svg>
                } @else {
                  {{ isAssigned(course.id) ? 'Снять' : 'Назначить' }}
                }
              </button>

            </div>
          }
        </div>
      }

      <div class="mt-6">
        <a [routerLink]="['/groups', groupId]"
           class="block w-full py-2.5 text-center bg-slate-200 dark:bg-slate-700
                  hover:bg-slate-300 dark:hover:bg-slate-600
                  text-slate-700 dark:text-slate-300 font-medium rounded-lg transition">
          Готово
        </a>
      </div>

    </div>
  </div>

</div>
