<div class="p-8 bg-slate-100 dark:bg-slate-900 min-h-full">

  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Курсы</h1>
    <a [routerLink]="['/courses/create']"
       class="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700
              text-white text-sm font-medium rounded-lg transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Добавить курс
    </a>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    @for (course of courses(); track course.id) {
      <a [routerLink]="['/courses', course.id]"
         class="group bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700
                shadow-sm hover:shadow-lg hover:border-indigo-500 dark:hover:border-indigo-500
                transition-all duration-200 overflow-hidden cursor-pointer">

        <div class="relative h-44 bg-slate-200 dark:bg-slate-700 overflow-hidden">
          @if (course.photoUrl) {
            <img [src]="course.photoUrl" [alt]="course.name"
                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"/>
          } @else {
            <div class="w-full h-full flex items-center justify-center">
              <svg class="w-12 h-12 text-slate-400 dark:text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13
                     C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13
                     C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13
                     C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
              </svg>
            </div>
          }
        </div>

        <div class="p-4">
          <h3 class="text-slate-900 dark:text-white font-semibold text-sm mb-1 truncate">
            {{ course.name }}
          </h3>
          <p class="text-slate-500 dark:text-slate-400 text-xs line-clamp-2 leading-relaxed">
            {{ course.description }}
          </p>
        </div>

      </a>
    }
  </div>

</div>
